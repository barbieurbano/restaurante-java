<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reviews Listado</title>
</head>
<body>
<h1>Opiniones de clientes</h1>
<ul>
    <li th:each="review : ${reviews}">
        <p th:text="${review.title}"></p>
        <p th:text="${review.description}"></p>
        <p th:text="${'Valoracion: ' + review.rating + '/5 estrellas'}"></p>
        <p th:text="${'Fecha: ' + review.creationDate}"></p>
        <!-- El unico problema es que si no existe nombre del restaurante esto puede dar un error-->
        <p th:text="${review.restaurant.name}"></p>
        <a th:href="@{/restaurants{id}(id=${review.restaurant.id})}">Ver restaurante</a>

    </li>
</ul>

</body>
</html>
