<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{layout/head :: head('Formulario Review')}"></head>

<body class="d-flex flex-column min-vh-100 bg-light">

<nav th:replace="~{layout/navbar :: navbar}"></nav>

<main class="container flex-grow-1 my-4">

    <h1 class="mb-0">
        <i class="fa-solid fa-utensils text-primary me-2"></i>Formulario review
    </h1>
    <!--primero enlazar, ir al detalle del plato o del detalle del restaurante y poner un boton
      para agregar la review, puede ser encima de las opiniones de los clientes, hasta aqui y luego hacer el formulario-->
    <form th:action="@{reviews}" method="post" th:object="${review}">
        <input type="hidden" th:field="*{id}">
        <input type="hidden" th:field="*{restaurant}">
        <input type="hidden" th:field="*{dish}">

        <div class="alert alert-info my-3" th:id="${review.restaurant != null}">
            <i class="fa-solid fa-store"></i>
            review sobre el restaurante:
            <strong th:text="${review.restaurant.name}"></strong>
        </div>

        <div class="alert alert-info my-3" th:id="${review.dish != null}">
            <i class="fa-solid fa-store"></i>
            review sobre el restaurante:
            <strong th:text="${review.dish.name}"></strong>
        </div>

        <div>
            <label for="title" class="form-label">Titulo</label>
            <input id="title" type="text" class="form-control" th:field="*{title}" required maxlength="100">
        </div>

        <div class="mb-3">
            <label for="description" class="form-label">Descripcion</label>
            <textarea id="description" class="form-control" row="4"
            th:field="*{description}" required maxlength="100"></textarea>
        </div>

        <div class="mb-3">
            <label for="rating" class="form-label">Puntuacion (de 1 a 5)</label>
            <input type="number" id="rating" class="form-control"
            th:field="*{rating}" min="1" max="5" required>
        </div>
        <button type="submit" class="btn btn-success">
            <i class="fa-solid fa-floppy-disk"></i>Enviar
        </button>

    </form>



</main>

<footer th:replace="~{layout/footer :: footer}"></footer>
<script th:replace="~{layout/footer :: scripts}"></script>

</body>
</html>
